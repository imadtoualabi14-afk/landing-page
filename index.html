<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate Gaming Guide</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#050816;
}

.background{

position:fixed;
width:100%;
height:100%;
background:
linear-gradient(120deg,#0f172a,#1e3a8a,#312e81,#0f172a);
background-size:400% 400%;

animation:gradient 15s ease infinite;

}

.background::before{

content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle,rgba(0,255,255,.12) 2px,transparent 2px);

background-size:50px 50px;

animation:move 25s linear infinite;

}

@keyframes gradient{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

@keyframes move{

from{
transform:translateY(0);
}

to{
transform:translateY(-400px);
}

}

.card{

position:relative;
z-index:2;

width:420px;

max-width:90%;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

padding:35px;

border-radius:25px;

text-align:center;

color:white;

box-shadow:0 0 35px rgba(0,255,255,.25);

}

.logo{

font-size:65px;

}

h1{

margin-top:10px;
font-size:34px;

}

p{

margin-top:15px;
line-height:1.6;
color:#ddd;

}

.button{

display:inline-block;

margin-top:30px;

padding:16px 45px;

border-radius:50px;

background:#00e5ff;

color:#000;

text-decoration:none;

font-size:20px;

font-weight:bold;

transition:.3s;

}

.button:hover{

transform:scale(1.08);

box-shadow:0 0 25px cyan;

}

.features{

margin-top:25px;

text-align:left;

line-height:2;

}

</style>

</head>

<body>

<div class="background"></div>

<div class="card">

<div class="logo">🎮</div>

<h1>Ultimate Gaming Guide</h1>

<p>

Master the latest tips, tricks and pro settings to level up your gameplay.

</p>

<div class="features">

✅ Pro Tips<br>

✅ Best Settings<br>

✅ Beginner Guide<br>

✅ Weekly Updates

</div>

<a href="YOUR_LINK_HERE" class="button">

GET ACCESS

</a>

</div>

</body>
</html>
